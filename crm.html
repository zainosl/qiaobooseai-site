<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0B0D0F; --bg2:#13161A; --bg3:#1C2026;
  --text:#F7F8FA; --muted:#A9B0BA; --dim:#4A525C;
  --accent:#58E1C1; --accent2:#3BB89A; --accent3:#7AF2D8;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --accent-dim:rgba(88,225,193,0.10); --accent-soft:rgba(88,225,193,0.05);
  --danger:#F6B66B;
  --font-sans:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --font-mono:'DM Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  --radius-sharp:2px; --radius-card:12px;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;min-height:100%;}
body{
  background:var(--bg); color:var(--text); font-family:var(--font-sans);
  line-height:1.6; -webkit-font-smoothing:antialiased;
}
body::before{
  content:''; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background-image:
    linear-gradient(rgba(88,225,193,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(88,225,193,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
body::after{
  content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(circle at 85% 6%,rgba(88,225,193,0.10),transparent 34%),
    radial-gradient(circle at 6% 92%,rgba(88,225,193,0.05),transparent 32%),
    linear-gradient(180deg,rgba(11,13,15,0),rgba(11,13,15,0.92));
}
a{color:inherit;}
button{font-family:var(--font-sans);cursor:pointer;}

/* ---------- Top bar ---------- */
.topbar{
  display:flex; align-items:center; gap:18px; flex-wrap:wrap;
  padding:18px clamp(16px,4vw,40px); border-bottom:1px solid var(--border);
  background:rgba(11,13,15,0.7); backdrop-filter:blur(8px);
  position:sticky; top:0; z-index:40;
}
.brand{display:flex; align-items:baseline; gap:10px;}
.brand .eyebrow{
  font-family:var(--font-mono); font-size:10px; letter-spacing:.22em; color:var(--accent);
  text-transform:uppercase; border:1px solid rgba(88,225,193,.3);
  background:rgba(88,225,193,.025); padding:5px 11px; border-radius:var(--radius-sharp);
}
.brand h1{margin:0; font-size:18px; font-weight:700; letter-spacing:-.01em;}
.brand .sub{color:var(--dim); font-size:12px; font-family:var(--font-mono);}
.cloud-badge{
  font-family:var(--font-mono); font-size:11px; letter-spacing:.04em; padding:3px 11px;
  border-radius:20px; border:1px solid var(--border2); color:var(--muted); white-space:nowrap;
}
.cloud-badge.ok{color:var(--accent); border-color:rgba(88,225,193,.4); background:rgba(88,225,193,.07);}
.cloud-badge.syncing{color:var(--accent3); border-color:rgba(122,242,216,.4);}
.cloud-badge.error{color:var(--danger); border-color:rgba(246,182,107,.5); background:rgba(246,182,107,.07);}
.cloud-badge.local{color:var(--dim);}
.spacer{flex:1;}

.stat-row{display:flex; gap:22px; flex-wrap:wrap;}
.stat{display:flex; flex-direction:column; line-height:1.2;}
.stat b{font-size:20px; font-family:var(--font-mono); color:var(--accent);}
.stat span{font-size:11px; color:var(--dim);}

/* ---------- Controls ---------- */
.controls{
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  padding:14px clamp(16px,4vw,40px); border-bottom:1px solid var(--border);
}
.seg{display:inline-flex; border:1px solid var(--border2); border-radius:var(--radius-sharp); overflow:hidden;}
.seg button{
  background:transparent; color:var(--muted); border:none; padding:9px 16px; font-size:13px; font-weight:500;
  border-right:1px solid var(--border2);
}
.seg button:last-child{border-right:none;}
.seg button.active{background:var(--accent); color:var(--bg); font-weight:700;}
input.search,select.filter{
  padding:10px 12px; border-radius:var(--radius-sharp); border:1px solid var(--border2);
  background:var(--bg); color:var(--text); font:inherit; font-size:13px; outline:none;
}
input.search{min-width:200px;}
input.search:focus,select.filter:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,225,193,.08);}
select.filter{cursor:pointer;}

.btn{
  border-radius:var(--radius-sharp); padding:10px 18px; font-weight:700; font-size:13px;
  transition:all .2s; letter-spacing:.04em; border:1px solid;
}
.btn-primary{background:var(--accent); color:var(--bg); border-color:var(--accent);}
.btn-primary:hover{background:var(--accent2); border-color:var(--accent2); transform:translateY(-1px);}
.btn-ghost{background:transparent; color:var(--muted); border-color:var(--border2);}
.btn-ghost:hover{border-color:var(--accent); color:var(--accent);}

/* ---------- Board (双轨) ---------- */
.board{
  display:flex; flex-direction:column; gap:26px;
  padding:20px clamp(16px,4vw,40px) 60px;
}
.track-head{
  display:flex; align-items:baseline; gap:12px; margin-bottom:12px;
  padding-bottom:10px; border-bottom:1px solid var(--border);
}
.track-name{font-size:14px; font-weight:700; letter-spacing:.04em; color:var(--text);}
.track-name::before{content:''; display:inline-block; width:6px; height:14px; background:var(--accent); margin-right:9px; vertical-align:-2px; border-radius:1px;}
.track-prod{
  font-family:var(--font-mono); font-size:10px; letter-spacing:.05em; padding:2px 9px;
  border-radius:var(--radius-sharp); background:rgba(88,225,193,.09); color:var(--accent);
  border:1px solid rgba(88,225,193,.24);
}
.track-hint{font-size:11px; color:var(--dim); font-family:var(--font-mono);}
.track-count{
  margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--dim);
  border:1px solid var(--border); border-radius:20px; padding:1px 10px;
}
.track-cols{
  display:grid; grid-auto-flow:column; grid-auto-columns:minmax(232px,1fr);
  gap:12px; overflow-x:auto; align-items:start; padding-bottom:4px;
}
.upsell-btn{
  width:100%; margin-top:10px; padding:7px 10px; border-radius:var(--radius-sharp);
  background:rgba(88,225,193,.08); color:var(--accent); border:1px dashed rgba(88,225,193,.4);
  font-size:12px; font-weight:700; letter-spacing:.03em; transition:all .18s;
}
.upsell-btn:hover{background:var(--accent); color:var(--bg); border-style:solid;}
.col{
  background:rgba(19,22,26,.55); border:1px solid var(--border); border-radius:var(--radius-card);
  min-height:120px; display:flex; flex-direction:column;
}
.col-head{
  display:flex; align-items:center; gap:8px; padding:14px 14px 10px;
  border-bottom:1px solid var(--border); position:sticky; top:0;
}
.col-head .dot{width:8px; height:8px; border-radius:50%; flex:none;}
.col-head h3{margin:0; font-size:13px; font-weight:700; letter-spacing:.02em;}
.col-head .count{
  font-family:var(--font-mono); font-size:11px; color:var(--dim);
  margin-left:auto; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:1px 9px;
}
.col-body{padding:10px; display:flex; flex-direction:column; gap:10px; flex:1;}
.col-body.drag-over{background:var(--accent-soft); outline:1px dashed var(--accent);}

.ccard{
  background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius-sharp);
  border-top:1px solid rgba(88,225,193,.16);
  padding:13px 13px 11px; cursor:grab; transition:border-color .15s,transform .15s;
}
.ccard:hover{border-color:var(--border2); transform:translateY(-1px);}
.ccard.dragging{opacity:.4;}
.ccard .row1{display:flex; align-items:center; gap:8px;}
.ccard .name{font-weight:700; font-size:15px;}
.ccard .conv{margin-left:auto; font-size:14px;}
.ccard .note-wx{font-size:12px; color:var(--muted); margin-top:2px;}
.ccard .meta{display:flex; flex-wrap:wrap; gap:5px; margin-top:9px;}
.pill{
  font-family:var(--font-mono); font-size:10px; letter-spacing:.05em; padding:2px 8px;
  border-radius:var(--radius-sharp); border:1px solid var(--border2); color:var(--muted);
}
.pill.prod{background:rgba(88,225,193,.09); color:var(--accent); border-color:rgba(88,225,193,.24);}
.pill.src{background:rgba(255,255,255,.03);}
.ccard .last{font-size:11px; color:var(--dim); margin-top:8px; font-family:var(--font-mono);}

/* ---------- Table view ---------- */
.tablewrap{padding:20px clamp(16px,4vw,40px) 60px; overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:13px;}
th,td{text-align:left; padding:11px 12px; border-bottom:1px solid var(--border); vertical-align:top;}
th{font-size:11px; color:var(--dim); font-family:var(--font-mono); letter-spacing:.08em; text-transform:uppercase; font-weight:500;}
tbody tr:hover{background:rgba(88,225,193,.03); cursor:pointer;}
td .name{font-weight:700;}
.status-chip{font-family:var(--font-mono); font-size:11px; padding:2px 9px; border-radius:20px; border:1px solid var(--border2); white-space:nowrap;}

/* ---------- Modal ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(5,6,7,.72); backdrop-filter:blur(4px);
  display:none; align-items:flex-start; justify-content:center; z-index:80; padding:40px 16px; overflow-y:auto;
}
.overlay.open{display:flex;}
.modal{
  width:min(560px,100%); background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--radius-card); padding:26px; box-shadow:0 30px 100px rgba(0,0,0,.5);
  border-top:1px solid rgba(88,225,193,.2);
}
.modal h2{margin:0 0 18px; font-size:19px; letter-spacing:-.01em;}
.field{margin-bottom:15px;}
.field label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-family:var(--font-mono); letter-spacing:.05em;}
.field input,.field select,.field textarea{
  width:100%; padding:11px 12px; border-radius:var(--radius-sharp); border:1px solid var(--border2);
  background:var(--bg); color:var(--text); font:inherit; font-size:14px; outline:none;
}
.field textarea{min-height:70px; resize:vertical; line-height:1.6;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,225,193,.08);}
.field2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

.log-list{margin:4px 0 0; padding:0; list-style:none; max-height:160px; overflow-y:auto;}
.log-list li{font-size:12px; color:var(--muted); padding:7px 0; border-bottom:1px solid var(--border); display:flex; gap:9px;}
.log-list li .t{color:var(--dim); font-family:var(--font-mono); flex:none; font-size:11px; padding-top:1px;}
.log-add{display:flex; gap:8px; margin-top:8px;}
.log-add input{flex:1;}

.modal-actions{display:flex; gap:10px; margin-top:22px; align-items:center;}
.modal-actions .spacer{flex:1;}
.link-danger{background:none; border:none; color:var(--danger); font-size:13px; cursor:pointer; padding:6px;}
.link-danger:hover{text-decoration:underline;}

.empty{color:var(--dim); font-size:12px; text-align:center; padding:18px 0; font-style:italic;}
.hidden{display:none !important;}
.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--bg3); border:1px solid var(--accent); color:var(--text);
  padding:11px 20px; border-radius:var(--radius-sharp); font-size:13px; z-index:120;
  opacity:0; transition:all .3s; box-shadow:0 10px 40px rgba(0,0,0,.4);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{height:9px; width:9px;}
::-webkit-scrollbar-thumb{background:var(--bg3); border-radius:20px;}
::-webkit-scrollbar-thumb:hover{background:#2a3038;}

/* ---------- Lockscreen ---------- */
.lockscreen{
  position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center;
  padding:24px; background:var(--bg);
}
.lockscreen::before{
  content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(circle at 50% 30%,rgba(88,225,193,.12),transparent 45%),
    linear-gradient(rgba(88,225,193,0.03) 1px,transparent 1px) 0 0/60px 60px,
    linear-gradient(90deg,rgba(88,225,193,0.03) 1px,transparent 1px) 0 0/60px 60px;
}
.lockbox{
  position:relative; z-index:1; width:min(380px,100%);
  background:var(--bg2); border:1px solid var(--border2); border-top:1px solid rgba(88,225,193,.2);
  border-radius:var(--radius-card); padding:32px 28px; text-align:center;
  box-shadow:0 30px 100px rgba(0,0,0,.5);
}
.lockbox .eyebrow{
  font-family:var(--font-mono); font-size:10px; letter-spacing:.22em; color:var(--accent);
  border:1px solid rgba(88,225,193,.3); background:rgba(88,225,193,.025);
  padding:5px 11px; border-radius:var(--radius-sharp); display:inline-block;
}
.lockbox h2{margin:16px 0 6px; font-size:20px; letter-spacing:-.01em;}
.lockbox p{margin:0 0 20px; color:var(--muted); font-size:13px; line-height:1.6;}
.lockbox input{
  width:100%; padding:13px 14px; margin-bottom:12px; border-radius:var(--radius-sharp);
  border:1px solid var(--border2); background:var(--bg); color:var(--text); font:inherit; outline:none; text-align:center;
}
.lockbox input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,225,193,.08);}
.lockerr{color:var(--danger); font-size:12px; margin-top:12px; min-height:16px;}
</style>

<body>

<!-- ===== 访问密码门（前端轻量防护，非加密安全）===== -->
<div class="lockscreen" id="lockscreen">

<script>
const CRM_CONFIG = window.CRM_CONFIG || {};
const ACCESS_PASSWORD = CRM_CONFIG.accessPassword || '';
const UNLOCK_KEY = 'yrgs_crm_unlocked';

function tryUnlock(){
  if(!ACCESS_PASSWORD){
    document.getElementById('lockErr').textContent = '请先设置页面访问密码';
    return;
  }
  const val = document.getElementById('lockInput').value;
  if(val === ACCESS_PASSWORD){
    try{ sessionStorage.setItem(UNLOCK_KEY,'1'); }catch(e){}
    unlock();
  }else{
    document.getElementById('lockErr').textContent = '密码不正确，请重试';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
  }
}
function unlock(){
  document.getElementById('lockscreen').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  if(!window.__crmStarted){ window.__crmStarted = true; startApp(); }
}
function startApp(){
  render();
  if(initCloud()){
    document.getElementById('pushBtn').classList.remove('hidden');
    setCloudStatus('syncing');
    pullCloud();           // 从云端拉取并覆盖本地
  }else{
    setCloudStatus('local');
  }
}
function initGate(){
  let unlocked = false;
  try{ unlocked = sessionStorage.getItem(UNLOCK_KEY) === '1'; }catch(e){}
  if(unlocked){ unlock(); }
  else{ setTimeout(()=>document.getElementById('lockInput').focus(),60); }
}

const SUPABASE_URL = CRM_CONFIG.supabaseUrl || '';
const SUPABASE_KEY = CRM_CONFIG.supabaseKey || '';
const TABLE = 'customers';

let sb = null;                 // supabase client
let cloudOn = false;           // 是否启用了云端
let legacyCloudSchema = false; // 云端旧表没有 sales_status / delivery_status 时自动回退
function initCloud(){
  const configured = SUPABASE_URL.indexOf('http')===0 && SUPABASE_KEY.length>20 && SUPABASE_KEY.indexOf('YOUR_')!==0;
  if(configured && window.supabase){
    try{ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); cloudOn = true; }
    catch(e){ cloudOn=false; }
  }
  return cloudOn;
}

// 顶部状态徽章：local / syncing / ok / error
function setCloudStatus(s){
  const b=document.getElementById('cloudBadge'); if(!b) return;
  const map={
    local:['本地模式','local'], syncing:['☁ 同步中…','syncing'],
    ok:['☁ 云端已同步','ok'], error:['⚠ 同步失败','error']
  };
  const [txt,cls]=map[s]||map.local;
  b.textContent=txt; b.className='cloud-badge '+cls;
}

// 手动：把当前本地全部数据上传覆盖到云端
async function pushAllToCloud(){
  if(!cloudOn){ toast('未配置云端'); return; }
  if(!confirm('把当前 '+data.length+' 条数据上传到云端？\n（云端同 id 的记录会被覆盖）')) return;
  await persist();           // 无参 = 整表 upsert
  toast('已上传到云端');
}

/* ---------- Config ----------
   双管道：销售轨(sales) + 交付轨(delivery)
   两条流程彼此独立，同一个客户会同时出现在销售流程和交付流程。
*/
const TRACKS = [
  {key:'sales',    label:'销售流程', hint:'按购买心智推进'},
  {key:'delivery', label:'交付流程', hint:'按服务履约节点推进'},
];
const STAGES = [
  // 销售轨
  {key:'intent',       track:'sales',    label:'有意向',       dot:'#A9B0BA'},
  {key:'deposit',      track:'sales',    label:'已付定金',     dot:'#58E1C1'},
  {key:'won',          track:'sales',    label:'已成交',       dot:'#7AF2D8'},
  {key:'lost',         track:'sales',    label:'已流失',       dot:'#F6B66B'},
  // 交付轨
  {key:'to_serve',     track:'delivery', label:'待服务',       dot:'#A9B0BA'},
  {key:'ability_mine', track:'delivery', label:'能力挖掘',     dot:'#58E1C1'},
  {key:'biz_research', track:'delivery', label:'商业模式调研', dot:'#7AF2D8'},
  {key:'biz_plan',     track:'delivery', label:'商业模式计划', dot:'#3BB89A'},
  {key:'biz_run',      track:'delivery', label:'商业模式跑通', dot:'#C4F970'},
  {key:'served',       track:'delivery', label:'服务完成',     dot:'#3BB89A'},
  {key:'aftercare',    track:'delivery', label:'售后中',       dot:'#7AF2D8'},
];
const STAGE_MAP = Object.fromEntries(STAGES.map(s=>[s.key,s]));
const stagesOf = (track)=>STAGES.filter(s=>s.track===track);
const stageField = (track)=>track==='sales'?'salesStatus':'deliveryStatus';
const stageOf = (c,track)=>c[stageField(track)] || (track==='sales'?'intent':'to_serve');
const isDeliveryCustomer = (c)=>stageOf(c,'sales')==='won' || c.converted==='yes';
const isInDeliveryFlow = (c)=>isDeliveryCustomer(c) && c.deliveryRemoved!=='yes';
const PRODUCT_LABEL = {'01':'01 能力判断','02':'02 首单冲刺','无':'未指定'};
// 旧状态 → 新状态迁移表（兼容历史数据）
const LEGACY_MAP = {lead:'intent', invited:'intent', trial:'deposit', delivered:'to_serve', serving:'ability_mine'};
const KEY = 'yrgs_crm_v1';

/* ---------- State ---------- */
let data = loadLocal();   // 先用本地数据秒开，再异步拉云端覆盖
let view = 'board';
let activeTrack = 'sales';
let modalTrack = 'sales';
let logsDraft = [];

function loadLocal(){
  try{ const r = localStorage.getItem(KEY); if(r){ return migrate(JSON.parse(r)); } }catch(e){}
  return seed();
}
// 把旧状态值升级到新的双轨状态
function migrate(arr){
  if(!Array.isArray(arr)) return seed();
  let changed=false;
  arr.forEach(c=>{
    const oldStatus = LEGACY_MAP[c.status] || c.status;
    const oldStage = STAGE_MAP[oldStatus];
    if(!c.salesStatus){
      c.salesStatus = oldStage?.track==='sales' ? oldStatus : ((oldStage?.track==='delivery' || c.converted==='yes') ? 'won' : 'intent');
      changed=true;
    }
    if(!c.deliveryStatus){
      c.deliveryStatus = oldStage?.track==='delivery' ? oldStatus : 'to_serve';
      changed=true;
    }
    if(!STAGE_MAP[c.salesStatus] || STAGE_MAP[c.salesStatus].track!=='sales'){ c.salesStatus='intent'; changed=true; }
    if(!STAGE_MAP[c.deliveryStatus] || STAGE_MAP[c.deliveryStatus].track!=='delivery'){ c.deliveryStatus='to_serve'; changed=true; }
    c.status = c.salesStatus;
  });
  if(changed){ try{ localStorage.setItem(KEY,JSON.stringify(arr)); }catch(e){} }
  return arr;
}

/* ---------- 持久化：本地立即写 + 云端后台同步 ---------- */
function persistLocal(){ try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){} }

// 通用保存：本地立刻写，云端按需 upsert 整张表
async function persist(changedRow){
  persistLocal();
  if(!cloudOn) return;
  setCloudStatus('syncing');
  try{
    if(changedRow){
      const { error } = await sb.from(TABLE).upsert(legacyCloudSchema ? toLegacyRow(changedRow) : toRow(changedRow));
      if(isMissingStatusColumn(error)){
        legacyCloudSchema = true;
        const retry = await sb.from(TABLE).upsert(toLegacyRow(changedRow));
        if(retry.error) throw retry.error;
        setCloudStatus('ok');
        return;
      }
      if(error) throw error;
    }else{
      // 批量：覆盖式同步整张表
      const { error } = await sb.from(TABLE).upsert(data.map(legacyCloudSchema ? toLegacyRow : toRow));
      if(isMissingStatusColumn(error)){
        legacyCloudSchema = true;
        const retry = await sb.from(TABLE).upsert(data.map(toLegacyRow));
        if(retry.error) throw retry.error;
        setCloudStatus('ok');
        return;
      }
      if(error) throw error;
    }
    setCloudStatus('ok');
  }catch(e){ console.warn('云同步失败',e); setCloudStatus('error'); }
}

async function removeFromCloud(id){
  if(!cloudOn) return;
  setCloudStatus('syncing');
  try{ const { error } = await sb.from(TABLE).delete().eq('id',id); if(error) throw error; setCloudStatus('ok'); }
  catch(e){ console.warn('云删除失败',e); setCloudStatus('error'); }
}

// 应用 ↔ 数据库 字段映射（数据库列名用下划线风格）
function toRow(c){
  return {
    id:c.id, name:c.name||'', wx:c.wx||'', status:c.salesStatus||c.status||'intent',
    sales_status:c.salesStatus||'intent', delivery_status:c.deliveryStatus||'to_serve',
    product:c.product||'无', source:c.source||'', contact:c.contact||'',
    converted:c.converted||'no', notes:c.notes||'', logs:packLogs(c),
    updated_at:new Date().toISOString()
  };
}
function toLegacyRow(c){
  return {
    id:c.id, name:c.name||'', wx:c.wx||'', status:c.salesStatus||c.status||'intent',
    product:c.product||'无', source:c.source||'', contact:c.contact||'',
    converted:c.converted||'no', notes:c.notes||'', logs:packLogs(c),
    updated_at:new Date().toISOString()
  };
}
function fromRow(r){
  const meta = readLogMeta(r.logs);
  return {
    id:r.id, name:r.name||'', wx:r.wx||'', status:r.status||'intent',
    salesStatus:r.sales_status||r.salesStatus||meta.salesStatus||'',
    deliveryStatus:r.delivery_status||r.deliveryStatus||meta.deliveryStatus||'',
    deliveryRemoved:r.deliveryRemoved||meta.deliveryRemoved||'',
    product:r.product||'无', source:r.source||'', contact:r.contact||'',
    converted:r.converted||'no', notes:r.notes||'', logs:visibleLogs(r.logs)
  };
}
function packLogs(c){
  const logs=visibleLogs(c.logs);
  return [{_crmMeta:true,salesStatus:c.salesStatus||'intent',deliveryStatus:c.deliveryStatus||'to_serve',deliveryRemoved:c.deliveryRemoved||''},...logs];
}
function visibleLogs(logs){
  return Array.isArray(logs) ? logs.filter(l=>!l?._crmMeta) : [];
}
function readLogMeta(logs){
  if(!Array.isArray(logs)) return {};
  return logs.find(l=>l&&l._crmMeta) || {};
}
function isMissingStatusColumn(error){
  if(!error) return false;
  const msg=String(error.message||error.details||'').toLowerCase();
  return msg.includes('sales_status') || msg.includes('delivery_status');
}

// 启动时：从云端拉取，作为真相源覆盖本地
async function pullCloud(){
  if(!cloudOn) return;
  setCloudStatus('syncing');
  try{
    const { data:rows, error } = await sb.from(TABLE).select('*');
    if(error) throw error;
    if(Array.isArray(rows)){
      if(rows.length===0){
        // 云端为空：把当前本地数据作为初始数据上传
        await persist();
      }else{
        data = migrate(rows.map(fromRow));
        persistLocal();
        render();
      }
    }
    setCloudStatus('ok');
  }catch(e){ console.warn('云拉取失败',e); setCloudStatus('error'); }
}

    mk({name:'Sun',       product:'01', wxId:'huidaobian1',     wxNote:'01-Sun 一堂 种子用户',         role:'一堂 种子用户',      region:'北京 昌平', source:'搜索手机号', added:'2026-04-15'}),

/* ---------- Render ---------- */
function setView(v){
  view=v;
  document.getElementById('viewBoard').classList.toggle('active',v==='board');
  document.getElementById('viewTable').classList.toggle('active',v==='table');
  document.getElementById('boardView').classList.toggle('hidden',v!=='board');
  document.getElementById('tableView').classList.toggle('hidden',v!=='table');
  document.getElementById('boardTrackTabs').classList.toggle('hidden',v!=='board');
  render();
}

function setActiveTrack(btn,track){
  activeTrack=track;
  document.querySelectorAll('.seg-track button').forEach(b=>b.classList.toggle('active',b===btn));
  render();
}

function setProduct(btn,val){
  document.getElementById('filterProduct').value=val;
  document.querySelectorAll('.seg-prod button').forEach(b=>b.classList.toggle('active',b===btn));
  render();
}

function getFiltered(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const fp=document.getElementById('filterProduct').value;
  const fs=document.getElementById('filterSource').value;
  return data.filter(c=>{
    if(fp && (c.product||'无')!==fp) return false;
    if(fs && (c.source||'')!==fs) return false;
    if(q){
      const blob=[c.name,c.wx,c.notes,c.source,c.contact,(c.logs||[]).map(l=>l.text).join(' ')].join(' ').toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });
}

function lastLog(c){ const l=c.logs||[]; return l.length?l[l.length-1]:null; }

function render(){
  refreshSourceFilters();
  renderStats();
  view==='board'?renderBoard():renderTable();
  document.getElementById('todayLabel').textContent='今天 '+todayStr();
}

function renderStats(){
  const total=data.length;
  const inSales=data.filter(c=>!['lost','won'].includes(stageOf(c,'sales'))).length;
  const inDelivery=data.filter(c=>isInDeliveryFlow(c)&&!['served','aftercare'].includes(stageOf(c,'delivery'))).length;
  const won=data.filter(c=>c.converted==='yes'||stageOf(c,'sales')==='won').length;
  document.getElementById('statRow').innerHTML=
    `<div class="stat"><b>${total}</b><span>客户总数</span></div>
     <div class="stat"><b>${inSales}</b><span>销售跟进中</span></div>
     <div class="stat"><b>${inDelivery}</b><span>交付推进中</span></div>
     <div class="stat"><b>${won}</b><span>已成交</span></div>`;
}

function renderBoard(){
  const list=getFiltered();
  const board=document.getElementById('boardView');
  board.innerHTML='';
  const fp=document.getElementById('filterProduct').value;
  const prodTag=fp?`<span class="track-prod">${fp==='01'?'01 能力判断':'02 首单冲刺'}</span>`:'';
  TRACKS.filter(t=>t.key===activeTrack).forEach(t=>{
    const trackList=t.key==='delivery'?list.filter(isInDeliveryFlow):list;
    const tStages=stagesOf(t.key);
    const tCount=trackList.length;
    const section=document.createElement('div'); section.className='track';
    section.innerHTML=`<div class="track-head"><span class="track-name">${t.label}</span>${prodTag}
      <span class="track-hint">${t.hint}</span><span class="track-count">${tCount}</span></div>`;
    const cols=document.createElement('div'); cols.className='track-cols';
    tStages.forEach(s=>{
      const items=trackList.filter(c=>stageOf(c,t.key)===s.key);
      const col=document.createElement('div'); col.className='col';
      col.innerHTML=`<div class="col-head"><span class="dot" style="background:${s.dot}"></span><h3>${s.label}</h3><span class="count">${items.length}</span></div>`;
      const body=document.createElement('div'); body.className='col-body'; body.dataset.track=t.key; body.dataset.stage=s.key;
      body.addEventListener('dragover',e=>{e.preventDefault(); body.classList.add('drag-over');});
      body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
      body.addEventListener('drop',e=>{e.preventDefault(); body.classList.remove('drag-over'); onDrop(e.dataTransfer.getData('id'),t.key,s.key);});
      if(items.length===0) body.innerHTML='<div class="empty">— 空 —</div>';
      items.forEach(c=>body.appendChild(cardEl(c,t.key)));
      col.appendChild(body); cols.appendChild(col);
    });
    section.appendChild(cols); board.appendChild(section);
  });
}

function cardEl(c,track){
  const el=document.createElement('div'); el.className='ccard'; el.draggable=true; el.dataset.id=c.id;
  const ll=lastLog(c);
  const conv=(c.converted==='yes')?'<span class="conv" title="已转化付费">✦</span>':'';
  // 01 客户在交付完成/售后阶段，显示「转 02 意向」入口
  const canUpsell = track==='delivery' && c.product==='01' && ['served','aftercare'].includes(stageOf(c,'delivery'));
  const pairStage = track==='sales' ? STAGE_MAP[stageOf(c,'delivery')] : STAGE_MAP[stageOf(c,'sales')];
  const pairLabel = track==='sales' ? '交付' : '销售';
  const pairText = track==='sales'&&!isInDeliveryFlow(c) ? '未进入' : (pairStage?pairStage.label:'—');
  el.innerHTML=
    `<div class="row1"><span class="name">${esc(c.name||'未命名')}</span>${conv}</div>
     ${c.wx?`<div class="note-wx">微信：${esc(c.wx)}</div>`:''}
     <div class="meta">
       <span class="pill prod">${PRODUCT_LABEL[c.product||'无']}</span>
       <span class="pill src">${pairLabel}：${pairText}</span>
       ${c.source?`<span class="pill src">${esc(c.source)}</span>`:''}
     </div>
     ${ll?`<div class="last">↳ ${ll.t} ${esc(ll.text)}</div>`:''}
     ${canUpsell?`<button class="upsell-btn" data-up="${c.id}">↗ 转 02 意向</button>`:''}`;
  el.addEventListener('dragstart',e=>{e.dataTransfer.setData('id',c.id); el.classList.add('dragging');});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  el.addEventListener('click',e=>{ if(e.target.dataset.up) return; openModal(c.id,track); });
  const up=el.querySelector('.upsell-btn');
  if(up) up.addEventListener('click',e=>{ e.stopPropagation(); upsellTo02(c.id); });
  return el;
}

// 一键：01 服务完 → 转 02 销售轨「有意向」
function upsellTo02(id){
  const c=data.find(x=>x.id===id); if(!c) return;
  if(!confirm('把「'+(c.name||'该客户')+'」转入 02 首单冲刺的「有意向」？\n（产品改为 02，回到销售轨）')) return;
  c.product='02'; c.salesStatus='intent'; c.status='intent'; c.converted='no';
  c.logs=c.logs||[]; c.logs.push({t:todayStr(),text:'01 服务完成，转入 02「有意向」'});
  persist(c); render(); toast('已转入 02 意向');
}

function renderTable(){
  const list=getFiltered();
  const tb=document.getElementById('tableBody'); tb.innerHTML='';
  if(list.length===0){ tb.innerHTML='<tr><td colspan="8" class="empty">没有匹配的客户</td></tr>'; return; }
  list.forEach(c=>{
    const ss=STAGE_MAP[stageOf(c,'sales')]; const ds=STAGE_MAP[stageOf(c,'delivery')]; const ll=lastLog(c);
    const deliveryLabel=isInDeliveryFlow(c)?ds.label:'未进入';
    const deliveryColor=isInDeliveryFlow(c)?ds.dot:'var(--dim)';
    const tr=document.createElement('tr'); tr.onclick=()=>openModal(c.id,'sales');
    tr.innerHTML=
      `<td><span class="name">${esc(c.name||'未命名')}</span> ${c.converted==='yes'?'<span style="color:var(--accent3)">✦</span>':''}</td>
       <td>${esc(c.wx||'—')}</td>
       <td><span class="status-chip" style="color:${ss.dot};border-color:${ss.dot}66">${ss.label}</span></td>
       <td><span class="status-chip" style="color:${deliveryColor};border-color:${isInDeliveryFlow(c)?ds.dot+'66':'var(--border2)'}">${deliveryLabel}</span></td>
       <td>${PRODUCT_LABEL[c.product||'无']}</td>
       <td>${esc(c.source||'—')}</td>
       <td>${esc(c.contact||'—')}</td>
       <td style="color:var(--dim);font-size:12px">${ll?ll.t+' '+esc(ll.text):'—'}</td>`;
    tb.appendChild(tr);
  });
}

function refreshSourceFilters(){
  const sources=[...new Set(data.map(c=>c.source).filter(Boolean))].sort();
  const sel=document.getElementById('filterSource'); const cur=sel.value;
  sel.innerHTML='<option value="">全部来源</option>'+sources.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  sel.value=cur;
  document.getElementById('srcList').innerHTML=sources.map(s=>`<option value="${esc(s)}">`).join('');
}

function onDrop(id,track,stage){
  const c=data.find(x=>x.id===id); if(!c||stageOf(c,track)===stage) return;
  if(track==='delivery'&&!isDeliveryCustomer(c)){ toast('成交后才会进入交付流程'); return; }
  const field=stageField(track);
  c[field]=stage;
  if(track==='sales') c.status=stage;
  c.logs=c.logs||[]; c.logs.push({t:todayStr(),text:'移至「'+STAGE_MAP[stage].label+'」'});
  if(track==='sales'&&stage==='won'&&c.converted!=='yes'){
    c.converted='yes';
    if(!c.deliveryStatus) c.deliveryStatus='to_serve';
    c.deliveryRemoved='';
  }
  persist(c); render(); toast('已更新状态');
}

/* ---------- Modal ---------- */
function fillStageSelect(){
  document.getElementById('f_sales_status').innerHTML=stagesOf('sales').map(s=>`<option value="${s.key}">${s.label}</option>`).join('');
  document.getElementById('f_delivery_status').innerHTML=stagesOf('delivery').map(s=>`<option value="${s.key}">${s.label}</option>`).join('');
}
function openModal(id,track='sales'){
  fillStageSelect(); logsDraft=[];
  const isEdit=!!id;
  modalTrack=track;
  document.getElementById('modalTitle').textContent=isEdit?'编辑客户':'新增客户';
  document.getElementById('deleteBtn').style.display=isEdit?'block':'none';
  document.getElementById('deleteBtn').textContent=track==='delivery'?'退出交付流程':'删除客户';
  if(isEdit){
    const c=data.find(x=>x.id===id);
    document.getElementById('f_id').value=c.id;
    document.getElementById('f_name').value=c.name||'';
    document.getElementById('f_wx').value=c.wx||'';
    document.getElementById('f_sales_status').value=stageOf(c,'sales');
    document.getElementById('f_delivery_status').value=stageOf(c,'delivery');
    document.getElementById('f_product').value=c.product||'无';
    document.getElementById('f_source').value=c.source||'';
    document.getElementById('f_contact').value=c.contact||'';
    document.getElementById('f_converted').value=c.converted||'no';
    document.getElementById('f_notes').value=c.notes||'';
    logsDraft=JSON.parse(JSON.stringify(c.logs||[]));
  }else{
    ['f_id','f_name','f_wx','f_source','f_contact','f_notes'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('f_sales_status').value='intent';
    document.getElementById('f_delivery_status').value='to_serve';
    document.getElementById('f_product').value='01';
    document.getElementById('f_converted').value='no';
  }
  renderLogs();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f_name').focus(),50);
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function renderLogs(){
  const ul=document.getElementById('logList');
  if(logsDraft.length===0){ ul.innerHTML='<li style="color:var(--dim);border:none">暂无跟进记录</li>'; return; }
  ul.innerHTML=logsDraft.map((l,i)=>`<li><span class="t">${l.t}</span><span>${esc(l.text)}</span></li>`).join('');
  ul.scrollTop=ul.scrollHeight;
}
function addLog(){
  const inp=document.getElementById('logInput'); const v=inp.value.trim();
  if(!v) return;
  logsDraft.push({t:todayStr(),text:v}); inp.value=''; renderLogs();
}
function saveCustomer(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){ toast('请填写姓名'); document.getElementById('f_name').focus(); return; }
  const id=document.getElementById('f_id').value;
  const existing=id?data.find(x=>x.id===id):null;
  const wasDeliveryCustomer=existing?isDeliveryCustomer(existing):false;
  const obj={
    name,
    wx:document.getElementById('f_wx').value.trim(),
    salesStatus:document.getElementById('f_sales_status').value,
    deliveryStatus:document.getElementById('f_delivery_status').value,
    product:document.getElementById('f_product').value,
    source:document.getElementById('f_source').value.trim(),
    contact:document.getElementById('f_contact').value.trim(),
    converted:document.getElementById('f_converted').value,
    notes:document.getElementById('f_notes').value.trim(),
    logs:logsDraft,
  };
  obj.status=obj.salesStatus;
  if((obj.salesStatus==='won'||obj.converted==='yes')&&!wasDeliveryCustomer){ obj.deliveryRemoved=''; }
  let row;
  if(id){ row=data.find(x=>x.id===id); Object.assign(row,obj); }
  else{ obj.id=uid(); data.push(obj); row=obj; }
  persist(row); closeModal(); render(); toast(id?'已保存':'已新增客户');
}
function deleteCustomer(){
  const id=document.getElementById('f_id').value;
  if(!id) return;
  const c=data.find(x=>x.id===id);
  if(modalTrack==='delivery'&&c){
    if(!confirm('从交付流程移除这个客户？销售流程中的客户记录会保留。')) return;
    c.deliveryRemoved='yes';
    c.logs=c.logs||[]; c.logs.push({t:todayStr(),text:'已从交付流程移除'});
    persist(c); closeModal(); render(); toast('已退出交付流程');
    return;
  }
  if(!confirm('确定删除这个客户？此操作不可撤销。')) return;
  data=data.filter(x=>x.id!==id); persistLocal(); removeFromCloud(id); closeModal(); render(); toast('已删除');
}

/* ---------- Import / Export ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='一人公司CRM_'+todayStr()+'.json'; a.click();
  toast('已导出备份');
}
function importData(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const arr=JSON.parse(r.result);
      if(!Array.isArray(arr)) throw 0;
      if(!confirm('导入将覆盖当前 '+data.length+' 条数据，确定？')) return;
      data=arr.map(c=>({id:c.id||uid(),name:c.name||'',wx:c.wx||'',status:c.status||'intent',salesStatus:c.salesStatus||c.sales_status||'',deliveryStatus:c.deliveryStatus||c.delivery_status||'',deliveryRemoved:c.deliveryRemoved||'',product:c.product||'无',source:c.source||'',contact:c.contact||'',converted:c.converted||'no',notes:c.notes||'',logs:c.logs||[]}));
      data=migrate(data);
      persist(); render(); toast('导入成功');
    }catch(err){ toast('文件格式不正确'); }
    e.target.value='';
  };
  r.readAsText(f);
}

/* ---------- Utils ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1900);
}
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

initGate();
</script>
</body>
</html>
